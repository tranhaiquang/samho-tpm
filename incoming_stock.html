<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Incoming Stock - Vietnam Samho</title>
    <link rel="icon" type="image/webp" href="assets/icon/samho-icon.webp" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <script src="supabase/config.js" defer></script>
    <script src="assets/js/auth.js" defer></script>
    <script src="assets/js/sidebar.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" defer></script>
    <script src="assets/js/incoming_stock.js" defer></script>
  </head>
  <body class="dashboard-app incoming-stock-page">
    <button class="icon-button sidebar-toggle" id="menuToggle" aria-label="Toggle sidebar" type="button"><i data-lucide="menu"></i></button>
    <aside class="sidebar" aria-label="Primary navigation">
      <div class="brand"><img class="brand-mark" src="assets/icon/samho-icon.webp" alt="SamHo" /><div><strong>Vietnam Samho</strong><span>Factory System</span></div></div>
      <nav class="nav-list">
        <section class="nav-group active"><button class="nav-head" type="button" aria-expanded="true"><i data-lucide="wrench"></i>Maintenance<i data-lucide="chevron-down"></i></button><a href="repair_submit.html"><i data-lucide="clipboard-pen-line"></i>BM</a><a href="kpi_dashboard.html"><i data-lucide="bar-chart-3"></i>KPI Dashboard</a></section>
        <section class="nav-group active"><button class="nav-head selected" type="button" aria-expanded="true"><i data-lucide="package-search"></i>Spare Part Management<i data-lucide="chevron-down"></i></button><a href="#"><i data-lucide="factory"></i>Machine</a><a href="spare_parts.html"><i data-lucide="boxes"></i>Spare part</a><a class="current" href="incoming_stock.html"><i data-lucide="truck"></i>Incoming stock</a></section>
      </nav>
      <div class="sidebar-footer"><button class="logout sidebar-logout" type="button"><i data-lucide="log-out"></i>Logout</button></div>
    </aside>
    <div class="shell"><main class="content">
      <section class="info-panel spare-panel">
        <div class="info-title"><i data-lucide="truck"></i><h1>Incoming Stock</h1></div>
        <p class="incoming-stock-note">Select spare parts and enter the quantity you want to order.</p>
        <div class="info-filter spare-filter incoming-stock-filter" aria-label="Filter spare parts">
          <label><span><i data-lucide="factory"></i>Plant</span><select id="incomingPlantFilter"><option value="">All plants</option></select></label>
          <label><span><i data-lucide="search"></i>Search</span><input id="incomingSearchInput" type="search" placeholder="Item code or Vietnamese name" /></label>
        </div>
        <p class="info-status incoming-stock-status" id="incomingStockStatus" aria-live="polite"></p>
      </section>
      <section class="repair-list" aria-label="Spare parts to order">
        <form id="incomingStockForm">
          <div class="repair-table-wrap spare-table-wrap">
            <table class="repair-table spare-table incoming-stock-table">
              <thead><tr><th>Item Code</th><th>Image</th><th>Name Vietnamese</th><th>Plant</th><th>Quantity</th><th><span class="sr-only">Select item</span></th></tr></thead>
              <tbody id="incomingStockList"><tr><td colspan="6">Loading spare parts…</td></tr></tbody>
            </table>
          </div>
          <div class="repair-pagination" id="incomingStockPagination" hidden></div>
          <div class="incoming-stock-actions"><button class="save" type="submit"><i data-lucide="clipboard-check"></i>Review Selected Items</button></div>
        </form>
      </section>
    </main></div>
    <div class="repair-modal incoming-stock-modal" id="incomingStockModal" aria-hidden="true">
      <div class="repair-modal-backdrop" data-close-incoming></div>
      <section class="repair-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="incomingStockModalTitle">
        <header class="repair-modal-header"><h2 id="incomingStockModalTitle">Order Summary</h2><button class="repair-modal-close" type="button" data-close-incoming aria-label="Close"><i data-lucide="x"></i></button></header>
        <div class="incoming-stock-modal-list" id="incomingStockModalList"></div>
        <footer class="repair-modal-footer"><div class="incoming-summary-actions"><button class="btn muted" type="button" data-close-incoming>Close</button><button class="save incoming-stock-export" id="incomingStockExport" type="button" aria-label="Export Excel" title="Export Excel"><i data-lucide="download"></i></button></div></footer>
      </section>
    </div>
  </body>
</html>
