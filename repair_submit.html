<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vietnam Samho - Maintenance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <script src="supabase/config.js" defer></script>
    <script src="assets/js/auth.js" defer></script>
    <script src="assets/js/sidebar.js" defer></script>
    <script src="https://unpkg.com/@zxing/browser@0.1.5" defer></script>
    <script src="assets/js/app.js" defer></script>
  </head>
  <body class="dashboard-app repair-submit-page">
    <button class="icon-button sidebar-toggle" id="menuToggle" aria-label="Toggle sidebar" type="button">
      <i data-lucide="menu"></i>
    </button>

    <aside class="sidebar" aria-label="Primary navigation">
      <div class="brand">
        <img class="brand-mark" src="assets/icon/samho-icon.webp" alt="SamHo" />
        <div>
          <strong>VietNam SamHo</strong>
          <span>Factory System</span>
        </div>
      </div>

      <nav class="nav-list">
        <section class="nav-group active">
          <button class="nav-head selected" type="button" aria-expanded="true">
            <i data-lucide="wrench"></i>
            Maintenance
            <i data-lucide="chevron-down"></i>
          </button>
          <a class="current" href="repair_submit.html"><i data-lucide="clipboard-pen-line"></i>RM</a>
          <a href="kpi_dashboard.html"><i data-lucide="bar-chart-3"></i>KPI Dashboard</a>
        </section>

        <section class="nav-group active">
          <button class="nav-head" type="button" aria-expanded="true">
            <i data-lucide="package-search"></i>
            Spare Part Management
            <i data-lucide="chevron-down"></i>
          </button>
          <a href="#"><i data-lucide="factory"></i>Machine</a>
          <a href="spare_parts.html"><i data-lucide="boxes"></i>Spare part</a>
        </section>
      </nav>

      <div class="sidebar-footer">
        <button class="logout sidebar-logout" type="button">
          <i data-lucide="log-out"></i>
          Logout
        </button>
      </div>
    </aside>

    <div class="shell">
      <main class="content">
        <div class="mode-tabs" aria-label="Maintenance type">
          <div class="mode-main" role="tablist">
            <button class="mode active" data-mode="BM" type="button"><i data-lucide="wrench"></i>BM</button>
            <button disabled class="mode rm" data-mode="RM" type="button"><i data-lucide="calendar-check"></i>RM</button>
            <button disabled class="mode pm" data-mode="PM" type="button"><i data-lucide="settings"></i>PM</button>
            <button disabled class="mode cm" data-mode="CM" type="button"><i data-lucide="file-warning"></i>CM</button>
          </div>
          <div class="mode-sub-buttons" id="modeSubButtons" aria-label="Maintenance actions"></div>
        </div>

        <section class="panel page-view active" id="repairSubmitView">
          <div class="panel-title">
            <i data-lucide="plus"></i>
            <h1>Nhập máy hư</h1>
          </div>

          <div class="action-row">
            <label class="scan-field">
              <span class="sr-only">Nhập code hoặc scan</span>
              <input id="codeSearch" type="text" placeholder="NHẬP CODE HOẶC SCAN" />
            </label>
            <button class="btn success" id="searchButton" type="button"><i data-lucide="search"></i>Search</button>
            <button class="btn primary scan-button" type="button"><i data-lucide="scan-line"></i>Scan</button>
            <button class="btn muted" type="button"><i data-lucide="arrow-left"></i>Back</button>
            <p class="search-status" id="searchStatus" aria-live="polite"></p>
          </div>

          <form class="maintenance-form" id="repairForm">
            <div class="machine-grid">
              <label class="field">
                <span>Item Code</span>
                <input id="itemCode" type="text" disabled />
              </label>
              <label class="field">
                <span>Machine Name</span>
                <input id="machineName" type="text" disabled />
              </label>
              <label class="field">
                <span>Specification</span>
                <input id="specification" type="text" disabled />
              </label>
              <label class="field">
                <span>Made By</span>
                <input id="madeBy" type="text" disabled />
              </label>
              <label class="field">
                <span>Status</span>
                <input id="machineStatus" type="text" disabled />
              </label>
              <label class="field">
                <span>Place</span>
                <input id="machinePlace" type="text" disabled />
              </label>
              <label class="field">
                <span>Plant</span>
                <input id="machinePlant" type="text" disabled />
              </label>
              <label class="field">
                <span>Section</span>
                <input id="machineSection" type="text" disabled />
              </label>
            </div>

            <div class="time-grid">
              <fieldset>
                <legend>Báo hư</legend>
                <input type="date" id="brokenDate" required />
                <input type="time" id="brokenTime" required />
              </fieldset>
              <fieldset>
                <legend>Bắt đầu sửa</legend>
                <input type="date" id="startDate" required />
                <input type="time" id="startTime" required />
              </fieldset>
              <fieldset>
                <legend>Sửa xong</legend>
                <input type="date" id="doneDate" required />
                <input type="time" id="doneTime" required />
              </fieldset>
            </div>

            <div class="detail-grid">
              <label class="field">
                <span>Vấn Đề / Issue</span>
                <select id="issue" required>
                  <option>Điện</option>
                  <option>Cơ khí</option>
                  <option>Áp suất</option>
                  <option>Khác</option>
                </select>
              </label>
              <label class="field">
                <span>Khác / Other</span>
                <input id="other" type="text" required />
              </label>
              <label class="field">
                <span>Nguyên nhân / Reason</span>
                <input id="reason" type="text" required />
              </label>
              <label class="field">
                <span>Cách kh.phục / Solve</span>
                <select id="solve" required>
                  <option>SỬA CHỮA</option>
                  <option>THAY THẾ</option>
                  <option>VỆ SINH</option>
                </select>
              </label>
              <label class="field">
                <span>Người sửa chữa / Mechanic</span>
                <input id="mechanic" type="text" required />
              </label>
            </div>

            <button class="save" id="saveButton" type="submit"><i data-lucide="save"></i>SAVE</button>
            <p class="save-status" id="saveStatus" aria-live="polite"></p>
          </form>
        </section>

        <section class="page-view" id="summaryReportView">
          <iframe class="pbi-frame" id="powerBiFrame" title="Summary Report"></iframe>
        </section>
      </main>
    </div>
  </body>
</html>
